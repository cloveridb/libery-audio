<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Daftar — LiberyAudio</title>
<link rel="stylesheet" href="/css/style.css">
<style>
body{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
.auth-box{width:100%;max-width:420px}
.auth-logo{text-align:center;margin-bottom:36px}
.auth-logo h1{font-size:28px;font-weight:800;letter-spacing:-1px}
.auth-logo h1 span{color:var(--accent)}
.auth-logo p{color:var(--muted);font-size:14px;margin-top:6px}
.auth-card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:32px}
.auth-title{font-size:20px;font-weight:800;margin-bottom:6px}
.auth-sub{color:var(--muted);font-size:13px;margin-bottom:28px}
.auth-footer{text-align:center;margin-top:20px;font-size:13px;color:var(--muted)}
#errorBox{background:rgba(239,68,68,0.08);border:1px solid rgba(239,68,68,0.2);border-radius:8px;padding:10px 14px;font-size:13px;color:var(--red);margin-bottom:16px;display:none}
#successBox{background:rgba(16,185,129,0.08);border:1px solid rgba(16,185,129,0.2);border-radius:8px;padding:10px 14px;font-size:13px;color:var(--green);margin-bottom:16px;display:none}
</style>
</head>
<body>
<div class="auth-box">
  <div class="auth-logo">
    <h1>Libery<span>Audio</span></h1>
    <p>Buat akun baru</p>
  </div>
  <div class="auth-card">
    <div class="auth-title">Daftar sekarang</div>
    <div class="auth-sub">Sudah punya akun? <a href="/login" style="color:var(--accent);font-weight:700">Masuk di sini</a></div>

    <div id="errorBox"></div>
    <div id="successBox"></div>

    <form id="registerForm">
      <div class="form-group">
        <label class="form-label">USERNAME</label>
        <input type="text" class="form-input" id="username" placeholder="pilih username unik" required>
        <div class="form-hint">Hanya huruf, angka, dan underscore</div>
      </div>
      <div class="form-group">
        <label class="form-label">EMAIL</label>
        <input type="email" class="form-input" id="email" placeholder="email@kamu.com" required>
      </div>
      <div class="form-group">
        <label class="form-label">PASSWORD</label>
        <input type="password" class="form-input" id="password" placeholder="minimal 6 karakter" required>
      </div>
      <div class="form-group">
        <label class="form-label">KONFIRMASI PASSWORD</label>
        <input type="password" class="form-input" id="password2" placeholder="ulangi password" required>
      </div>
      <button type="submit" class="btn btn-primary btn-full" id="submitBtn">
        Buat Akun
      </button>
    </form>
  </div>
  <div class="auth-footer">&copy; 2024 LiberyAudio</div>
</div>

<script>
document.getElementById('registerForm').addEventListener('submit', async (e) => {
  e.preventDefault()
  const btn = document.getElementById('submitBtn')
  const err = document.getElementById('errorBox')
  const ok  = document.getElementById('successBox')
  err.style.display = 'none'
  ok.style.display  = 'none'

  const pass  = document.getElementById('password').value
  const pass2 = document.getElementById('password2').value
  if (pass !== pass2) {
    err.textContent = 'Password tidak cocok!'
    err.style.display = 'block'
    return
  }

  btn.textContent = 'Membuat akun...'
  btn.disabled = true

  const res  = await fetch('/api/register', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      username: document.getElementById('username').value,
      email:    document.getElementById('email').value,
      password: pass,
    })
  })
  const data = await res.json()

  if (data.success) {
    ok.textContent = '✅ Akun berhasil dibuat! Mengalihkan...'
    ok.style.display = 'block'
    setTimeout(() => window.location.href = '/dashboard', 1200)
  } else {
    err.textContent = data.error
    err.style.display = 'block'
    btn.textContent = 'Buat Akun'
    btn.disabled = false
  }
})
</script>
</body>
</html>
