<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Login — LiberyAudio</title>
<link rel="stylesheet" href="/css/style.css">
<style>
body{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
.auth-box{width:100%;max-width:400px}
.auth-logo{text-align:center;margin-bottom:36px}
.auth-logo h1{font-size:28px;font-weight:800;letter-spacing:-1px}
.auth-logo h1 span{color:var(--accent)}
.auth-logo p{color:var(--muted);font-size:14px;margin-top:6px}
.auth-card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:32px}
.auth-title{font-size:20px;font-weight:800;margin-bottom:6px}
.auth-sub{color:var(--muted);font-size:13px;margin-bottom:28px}
.auth-footer{text-align:center;margin-top:20px;font-size:13px;color:var(--muted)}
.auth-footer a{color:var(--accent);font-weight:700}
.divider{border:none;border-top:1px solid var(--border);margin:20px 0}
#errorBox{background:rgba(239,68,68,0.08);border:1px solid rgba(239,68,68,0.2);border-radius:8px;padding:10px 14px;font-size:13px;color:var(--red);margin-bottom:16px;display:none}
</style>
</head>
<body>
<div class="auth-box">
  <div class="auth-logo">
    <h1>Libery<span>Audio</span></h1>
    <p>Convert & Upload Audio ke Roblox</p>
  </div>
  <div class="auth-card">
    <div class="auth-title">Masuk ke akun</div>
    <div class="auth-sub">Belum punya akun? <a href="/register" style="color:var(--accent);font-weight:700">Daftar sekarang</a></div>

    <div id="errorBox"></div>

    <form id="loginForm">
      <div class="form-group">
        <label class="form-label">USERNAME</label>
        <input type="text" class="form-input" id="username" placeholder="username kamu" required autocomplete="username">
      </div>
      <div class="form-group">
        <label class="form-label">PASSWORD</label>
        <input type="password" class="form-input" id="password" placeholder="••••••••" required autocomplete="current-password">
      </div>
      <button type="submit" class="btn btn-primary btn-full" id="submitBtn">
        Masuk
      </button>
    </form>
  </div>
  <div class="auth-footer">
    &copy; 2024 LiberyAudio
  </div>
</div>

<script>
document.getElementById('loginForm').addEventListener('submit', async (e) => {
  e.preventDefault()
  const btn = document.getElementById('submitBtn')
  const err = document.getElementById('errorBox')
  btn.textContent = 'Masuk...'
  btn.disabled = true
  err.style.display = 'none'

  const res  = await fetch('/api/login', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      username: document.getElementById('username').value,
      password: document.getElementById('password').value,
    })
  })
  const data = await res.json()

  if (data.success) {
    window.location.href = data.redirect || '/dashboard'
  } else {
    err.textContent = data.error
    err.style.display = 'block'
    btn.textContent = 'Masuk'
    btn.disabled = false
  }
})
</script>
</body>
</html>
